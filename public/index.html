<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>WARZONE 1v1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
body{color:#fff;font-family:'Courier New',monospace;}
#c{display:block;position:absolute;top:0;left:0;}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
#ch{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;}
#ch::before,#ch::after{content:'';position:absolute;background:#fff;}
#ch::before{width:2px;height:20px;left:9px;top:0;}
#ch::after{width:20px;height:2px;top:9px;left:0;}
#ch.aim{width:8px;height:8px;}
#ch.aim::before{height:8px;left:3px;}
#ch.aim::after{width:8px;top:3px;}
#hud{position:absolute;bottom:165px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-end;}
#ammo{font-size:22px;font-weight:bold;color:#f80;}
#gname{font-size:10px;color:#aaa;letter-spacing:2px;}
#hw{width:140px;}
#hl{font-size:9px;color:#aaa;margin-bottom:3px;letter-spacing:2px;}
#hbg{background:rgba(255,255,255,0.1);border-radius:3px;height:6px;}
#hf{height:6px;background:#2ecc71;border-radius:3px;}
#sc{position:absolute;top:14px;left:50%;transform:translateX(-50%);text-align:center;}
#st{font-size:26px;font-weight:bold;letter-spacing:6px;}
#sl{font-size:9px;color:#555;letter-spacing:2px;}
#mm{position:absolute;top:14px;right:12px;}
#kf{position:absolute;top:100px;right:12px;font-size:10px;}
.ke{background:rgba(0,0,0,0.7);padding:3px 8px;margin:2px 0;border-left:2px solid #e74c3c;}
#hi{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:#e74c3c;opacity:0;pointer-events:none;}
#df{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;background:rgba(231,76,60,0.2);z-index:10;}
#av{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;opacity:0;background:radial-gradient(ellipse,transparent 35%,rgba(0,0,0,0.8) 100%);z-index:5;}
#rb{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);width:160px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;display:none;}
#rf{height:100%;background:#f39c12;border-radius:2px;animation:rl linear;}
@keyframes rl{from{width:0}to{width:100%}}
#pg{position:absolute;top:14px;left:12px;font-size:9px;color:#444;}
#lm{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);font-size:10px;color:#555;white-space:nowrap;}
#mc{position:absolute;bottom:0;left:0;width:100%;height:150px;pointer-events:none;z-index:50;}
#jz{position:absolute;bottom:10px;left:10px;width:130px;height:130px;pointer-events:all;}
#jb{position:absolute;width:110px;height:110px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);top:10px;left:10px;}
#jk{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.25);border:2px solid rgba(255,255,255,0.4);top:32px;left:32px;}
#lz{position:absolute;bottom:0;left:150px;right:160px;height:150px;pointer-events:all;}
#sb{position:absolute;bottom:20px;right:10px;width:70px;height:70px;border-radius:50%;background:rgba(231,76,60,0.4);border:2px solid rgba(231,76,60,0.7);pointer-events:all;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;user-select:none;}
#ab{position:absolute;bottom:100px;right:90px;width:56px;height:56px;border-radius:50%;background:rgba(52,152,219,0.35);border:2px solid rgba(52,152,219,0.6);pointer-events:all;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;user-select:none;}
#rlb{position:absolute;bottom:100px;right:10px;width:56px;height:56px;border-radius:50%;background:rgba(243,156,18,0.3);border:2px solid rgba(243,156,18,0.5);pointer-events:all;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;user-select:none;}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;pointer-events:all;}
#ov h1{font-size:clamp(26px,8vw,50px);letter-spacing:10px;color:#e74c3c;margin-bottom:6px;}
#ov h2{font-size:11px;letter-spacing:4px;color:#444;margin-bottom:28px;}
.mi{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:11px 16px;font-family:'Courier New',monospace;font-size:12px;width:min(280px,85vw);text-align:center;margin:4px;}
.mi:focus{outline:none;border-color:#e74c3c;}
.mb{background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:12px 30px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:3px;cursor:pointer;margin:5px;width:min(280px,85vw);}
.mb:hover{background:rgba(231,76,60,0.2);border-color:#e74c3c;}
#sm{font-size:10px;color:#555;margin-top:16px;text-align:center;padding:0 20px;line-height:1.9;}
#go{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:190;pointer-events:all;}
#go h1{font-size:clamp(32px,10vw,60px);letter-spacing:10px;}
#go p{color:#888;margin:10px 0 26px;letter-spacing:3px;font-size:11px;}
#ds{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(180,0,0,0.2);display:none;align-items:center;justify-content:center;z-index:80;pointer-events:none;}
#dt{font-size:clamp(26px,8vw,46px);letter-spacing:8px;color:#e74c3c;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="ch"></div>
  <div id="df"></div>
  <div id="av"></div>
  <div id="hi">✦</div>
  <div id="sc"><div id="st">0 — 0</div><div id="sl">first to 5</div></div>
  <div id="mm"><canvas id="mc2" width="90" height="90" style="border:1px solid rgba(255,255,255,0.15);border-radius:3px;"></canvas></div>
  <div id="kf"></div>
  <div id="hud">
    <div id="hw"><div id="hl">HEALTH</div><div id="hbg"><div id="hf" style="width:100%"></div></div></div>
    <div style="text-align:right"><div id="gname">—</div><div id="ammo">—</div></div>
  </div>
  <div id="rb"><div id="rf"></div></div>
  <div id="pg">PING: —</div>
  <div id="lm">CLICK TO LOCK MOUSE</div>
</div>
<div id="ds"><div id="dt">YOU DIED</div></div>
<div id="mc">
  <div id="jz"><div id="jb"></div><div id="jk"></div></div>
  <div id="lz"></div>
  <div id="sb">SHOOT</div>
  <div id="ab">AIM</div>
  <div id="rlb">RELOAD</div>
</div>
<div id="ov">
  <h1>WARZONE</h1>
  <h2>1 VS 1 · BEST OF 5</h2>
  <input class="mi" id="ri" placeholder="ROOM CODE e.g. ARENA1" maxlength="12" style="text-transform:uppercase"/>
  <button class="mb" onclick="connectAndPlay()">⚔ JOIN / CREATE ROOM</button>
  <hr style="width:min(280px,85vw);border-color:rgba(255,255,255,0.08);margin:12px 0;">
  <button class="mb" onclick="playSolo()">▶ SOLO vs BOT</button>
  <div id="sm">SHARE THE SAME ROOM CODE WITH YOUR OPPONENT</div>
</div>
<div id="go">
  <h1 id="gt">YOU WIN</h1><p id="gs">MATCH COMPLETE</p>
  <button class="mb" onclick="resetGame()">PLAY AGAIN</button>
  <button class="mb" onclick="backToMenu()">MENU</button>
</div>
<script>
// ── SETUP ──
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
const mm=document.getElementById('mc2');
const mx=mm.getContext('2d');
const isMob=('ontouchstart' in window);
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);

// ── GUNS ──
const GUNS=[
  {name:'ASSAULT RIFLE',ammo:30,max:30,dmg:25,rate:150,spread:0.04,reload:2000,auto:true,range:440},
  {name:'SHOTGUN',ammo:8,max:8,dmg:80,rate:900,spread:0.18,pellets:6,reload:2600,auto:false,range:160},
  {name:'SNIPER',ammo:5,max:5,dmg:95,rate:1300,spread:0.001,reload:3200,auto:false,range:950},
  {name:'SMG',ammo:45,max:45,dmg:15,rate:80,spread:0.08,reload:1600,auto:true,range:270},
  {name:'PISTOL',ammo:15,max:15,dmg:38,rate:420,spread:0.05,reload:1300,auto:false,range:320},
];

// ── MAP ──
const SZ=800;
// each wall: [x,y,w,h,type] type: 0=wall,1=building,2=car,3=pillar
const WL=[
  [0,0,800,20,0],[0,780,800,20,0],[0,0,20,800,0],[780,0,20,800,0],
  [80,80,120,80,1],[80,80,80,120,1],[600,80,120,80,1],[640,80,80,120,1],
  [80,640,120,80,1],[80,600,80,120,1],[600,640,120,80,1],[640,600,80,120,1],
  [330,310,140,20,0],[330,470,140,20,0],[330,310,20,80,0],[450,310,20,80,0],
  [330,410,20,80,0],[450,410,20,80,0],
  [200,178,52,26,2],[200,596,52,26,2],[548,178,52,26,2],[548,596,52,26,2],
  [358,178,84,26,2],[358,596,84,26,2],
  [240,358,22,22,3],[538,358,22,22,3],[240,420,22,22,3],[538,420,22,22,3],
  [178,298,22,104,0],[600,298,22,104,0],[258,228,104,22,0],[438,228,104,22,0],
  [258,550,104,22,0],[438,550,104,22,0],
];
// wall colors by type [r,g,b]
const WC=[[48,48,60],[52,64,90],[82,52,28],[68,54,80]];
const SP=[{x:120,y:120},{x:680,y:680},{x:120,y:680},{x:680,y:120}];

// ── STATE ──
let P={x:120,y:120,a:0,hp:100,gun:null,ammo:0,score:0,rld:false,dead:false};
let O={x:680,y:680,a:Math.PI,hp:100,score:0,dead:false,vis:false};
let BULS=[],PARTS=[];
let ws=null,going=false,solo=false,bot={};
let pt=0,lpt=0,keys={},mdx=0,locked=false;
let mdown=false,aiming=false,lshot=0,lframe=0;
let jact=false,jdx=0,jdy=0,jtid=null,ltid=null,llx=0;
const JR=44;
const VFOV=Math.PI/2.8;
let ZB=new Float32Array(2);

function pickGun(){return JSON.parse(JSON.stringify(GUNS[Math.floor(Math.random()*GUNS.length)]));}

function inWall(x,y,r){
  for(let i=0;i<WL.length;i++){
    const w=WL[i];
    if(x-r<w[0]+w[2]&&x+r>w[0]&&y-r<w[1]+w[3]&&y+r>w[1])return true;
  }
  return false;
}

// ── HUD ──
function upHUD(){
  const g=P.gun;if(!g)return;
  document.getElementById('gname').textContent=g.name;
  document.getElementById('ammo').textContent=P.ammo+'/'+g.max;
  const h=document.getElementById('hf');
  h.style.width=P.hp+'%';
  h.style.background=P.hp>50?'#2ecc71':P.hp>25?'#f39c12':'#e74c3c';
}
function upScore(){document.getElementById('st').textContent=P.score+' — '+O.score;}
function kfeed(k,v){
  const el=document.createElement('div');el.className='ke';el.textContent=k+' → '+v;
  document.getElementById('kf').appendChild(el);setTimeout(()=>el.remove(),4000);
}

// ── SPAWN ──
function spawnP(idx){
  const s=SP[idx||0];P.x=s.x;P.y=s.y;
  P.hp=100;P.dead=false;P.rld=false;
  P.gun=pickGun();P.ammo=P.gun.ammo;
  document.getElementById('ds').style.display='none';
  upHUD();
}

// ── SHOOT ──
function shoot(){
  if(!P.gun||P.dead||P.rld)return;
  const now=Date.now();
  if(now-lshot<P.gun.rate)return;
  if(P.ammo<=0){reload();return;}
  lshot=now;P.ammo--;upHUD();
  const n=P.gun.pellets||1,sm=aiming?0.2:1;
  for(let i=0;i<n;i++){
    const sp=(Math.random()-.5)*P.gun.spread*2*sm;
    const ang=P.a+sp;
    BULS.push({x:P.x,y:P.y,a:ang,spd:14,own:'local',d:0,max:P.gun.range});
    if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'shoot',angle:ang,x:P.x,y:P.y}));
  }
  fx(P.x+Math.cos(P.a)*20,P.y+Math.sin(P.a)*20,'#ff0',5);
}

function reload(){
  if(P.rld||!P.gun||P.ammo===P.gun.max)return;
  P.rld=true;
  const b=document.getElementById('rb'),f=document.getElementById('rf');
  b.style.display='block';f.style.animationDuration=P.gun.reload+'ms';
  f.style.width='0';void f.offsetWidth;f.style.width='100%';
  setTimeout(()=>{P.rld=false;P.ammo=P.gun.max;b.style.display='none';upHUD();},P.gun.reload);
}

function fx(x,y,c,n){
  for(let i=0;i<n;i++)PARTS.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:1,c});
}

function dmg(v){
  if(P.dead)return;P.hp=Math.max(0,P.hp-v);upHUD();
  const f=document.getElementById('df');f.style.opacity='1';setTimeout(()=>f.style.opacity='0',200);
  if(P.hp<=0)pDie();
}

function pDie(){
  P.dead=true;O.score++;upScore();kfeed('ENEMY','YOU');
  document.getElementById('ds').style.display='flex';
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'died'}));
  if(O.score>=5){endGame(false);return;}
  setTimeout(()=>respawn(),2500);
}

function oDie(){
  O.dead=true;P.score++;upScore();kfeed('YOU','ENEMY');
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'kill'}));
  if(P.score>=5){endGame(true);return;}
  setTimeout(()=>{O.dead=false;O.hp=100;const s=SP[Math.floor(Math.random()*4)];O.x=s.x;O.y=s.y;},2500);
}

function respawn(){
  const s=SP[Math.floor(Math.random()*4)];
  P.x=s.x;P.y=s.y;P.hp=100;P.dead=false;P.rld=false;
  P.gun=pickGun();P.ammo=P.gun.max;
  document.getElementById('ds').style.display='none';upHUD();
}

function endGame(win){
  document.getElementById('gt').textContent=win?'YOU WIN':'YOU LOSE';
  document.getElementById('gt').style.color=win?'#2ecc71':'#e74c3c';
  document.getElementById('gs').textContent=P.score+' — '+O.score+' · '+(win?'VICTORY':'DEFEAT');
  document.getElementById('go').style.display='flex';going=false;
}

function resetGame(){
  P.score=0;O.score=0;P.hp=100;O.hp=100;P.dead=false;O.dead=false;
  document.getElementById('go').style.display='none';
  document.getElementById('kf').innerHTML='';
  upScore();respawn();going=true;if(solo)initBot();
}

function backToMenu(){
  document.getElementById('go').style.display='none';
  document.getElementById('ov').style.display='flex';
  if(ws){ws.close();ws=null;}solo=false;going=false;P.score=0;O.score=0;upScore();
}

// ── BOT ──
function initBot(){
  O.x=680;O.y=680;O.hp=100;O.dead=false;O.vis=true;
  bot={s:'roam',t:0,tx:400,ty:400,st:0};
}

function updBot(dt){
  if(!solo||O.dead)return;
  bot.t-=dt;bot.st-=dt;
  const dx=P.x-O.x,dy=P.y-O.y,d=Math.sqrt(dx*dx+dy*dy);
  O.a=Math.atan2(dy,dx);
  bot.s=d<400?'hunt':'roam';
  if(bot.s==='hunt'){
    const spd=1.8,nx=O.x+(dx/d)*spd,ny=O.y+(dy/d)*spd;
    if(!inWall(nx,O.y,10))O.x=nx;
    if(!inWall(O.x,ny,10))O.y=ny;
    if(bot.st<=0&&!O.dead){
      bot.st=300+Math.random()*400;
      BULS.push({x:O.x,y:O.y,a:O.a+(Math.random()-.5)*0.15,spd:12,own:'bot',d:0,max:450});
    }
  } else {
    if(bot.t<=0){bot.tx=60+Math.random()*680;bot.ty=60+Math.random()*680;bot.t=2000;}
    const tdx=bot.tx-O.x,tdy=bot.ty-O.y,td=Math.sqrt(tdx*tdx+tdy*tdy);
    if(td>10){
      const nx=O.x+(tdx/td)*1.4,ny=O.y+(tdy/td)*1.4;
      if(!inWall(nx,ny,10)){O.x=nx;O.y=ny;}
    }
  }
}

// ── MOVE ──
function moveP(){
  if(P.dead)return;
  const spd=aiming?2:3.5,co=Math.cos(P.a),si=Math.sin(P.a);
  let mx=0,my=0;
  if(keys['KeyW']||keys['ArrowUp']){mx+=co;my+=si;}
  if(keys['KeyS']||keys['ArrowDown']){mx-=co;my-=si;}
  if(keys['KeyA']||keys['ArrowLeft']){mx+=si;my-=co;}
  if(keys['KeyD']||keys['ArrowRight']){mx-=si;my+=co;}
  if(jact){
    const jl=Math.sqrt(jdx*jdx+jdy*jdy);
    if(jl>8){mx=jdx/jl*co+jdy/jl*si;my=jdx/jl*si-jdy/jl*co;}
  }
  const len=Math.sqrt(mx*mx+my*my);
  if(len>0){mx/=len;my/=len;}
  const nx=P.x+mx*spd,ny=P.y+my*spd;
  if(!inWall(nx,P.y,12))P.x=nx;
  if(!inWall(P.x,ny,12))P.y=ny;
  P.x=Math.max(25,Math.min(SZ-25,P.x));
  P.y=Math.max(25,Math.min(SZ-25,P.y));
  if(locked){P.a+=mdx*0.002;mdx=0;}
  if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'pos',x:P.x,y:P.y,angle:P.a,health:P.hp}));
}

// ── BULLETS ──
function updBuls(){
  for(let i=BULS.length-1;i>=0;i--){
    const b=BULS[i];let hit=false;
    for(let s=0;s<5;s++){
      b.x+=Math.cos(b.a)*b.spd/5;
      b.y+=Math.sin(b.a)*b.spd/5;
      b.d+=b.spd/5;
      if(b.d>b.max||b.x<0||b.x>SZ||b.y<0||b.y>SZ){hit=true;break;}
      for(let wi=0;wi<WL.length;wi++){
        const w=WL[wi];
        if(b.x>=w[0]&&b.x<=w[0]+w[2]&&b.y>=w[1]&&b.y<=w[1]+w[3]){
          fx(b.x,b.y,'#ccc',3);hit=true;break;
        }
      }
      if(hit)break;
      if(b.own==='local'&&!O.dead&&Math.abs(b.x-O.x)<18&&Math.abs(b.y-O.y)<18){
        fx(b.x,b.y,'#e74c3c',8);
        document.getElementById('hi').style.opacity='1';
        setTimeout(()=>document.getElementById('hi').style.opacity='0',120);
        const d=P.gun?P.gun.dmg:25;
        if(!solo&&ws&&ws.readyState===1)ws.send(JSON.stringify({type:'hit',damage:d}));
        if(solo){O.hp-=d;if(O.hp<=0)oDie();}
        hit=true;break;
      }
      if((b.own==='bot'||b.own==='remote')&&!P.dead&&Math.abs(b.x-P.x)<18&&Math.abs(b.y-P.y)<18){
        fx(b.x,b.y,'#e74c3c',8);dmg(25);hit=true;break;
      }
    }
    if(hit)BULS.splice(i,1);
  }
}

function updParts(){
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.06;
    if(p.life<=0)PARTS.splice(i,1);
  }
}

// ── RENDER WORLD (RAYCASTER) ──
function drawWorld(){
  const W=cv.width,H=cv.height;
  // sky
  cx.fillStyle='#0a0a18';cx.fillRect(0,0,W,H/2);
  // floor
  cx.fillStyle='#111';cx.fillRect(0,H/2,W,H/2);

  if(ZB.length!==W)ZB=new Float32Array(W);

  const fov=aiming?VFOV*0.45:VFOV;
  const zoom=aiming?1.8:1.0;

  for(let col=0;col<W;col++){
    // ray direction
    const rayA=P.a+(col/W-0.5)*fov;
    const rdx=Math.cos(rayA),rdy=Math.sin(rayA);

    let dist=0,wtype=0,hit=false;

    // step 1 unit at a time for accuracy
    for(let step=1;step<900;step++){
      const rx=P.x+rdx*step;
      const ry=P.y+rdy*step;
      if(rx<=0||rx>=SZ||ry<=0||ry>=SZ){dist=step;break;}
      for(let wi=0;wi<WL.length;wi++){
        const w=WL[wi];
        if(rx>=w[0]&&rx<w[0]+w[2]&&ry>=w[1]&&ry<w[1]+w[3]){
          dist=step;wtype=w[4];hit=true;break;
        }
      }
      if(hit)break;
    }
    if(dist===0)dist=900;

    // fisheye fix
    const corr=Math.max(1,dist*Math.cos((col/W-0.5)*fov));
    ZB[col]=corr;

    // wall slice height
    const wh=Math.min(H*4,(SZ/corr)*280*zoom);
    const wt=(H-wh)/2;

    // shade by distance
    const shade=Math.min(1,150/corr);
    const bc=WC[wtype]||WC[0];
    cx.fillStyle='rgb('+Math.floor(bc[0]*shade)+','+Math.floor(bc[1]*shade)+','+Math.floor(bc[2]*shade)+')';
    cx.fillRect(col,wt,1,wh);
  }
}

// ── RENDER OPPONENT SPRITE ──
function drawOpponent(){
  if((!O.vis&&!solo)||O.dead)return;
  const W=cv.width,H=cv.height;

  const dx=O.x-P.x,dy=O.y-P.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<8)return;

  // angle to opponent relative to where player is looking
  let ang=Math.atan2(dy,dx)-P.a;
  // wrap
  while(ang> Math.PI)ang-=2*Math.PI;
  while(ang<-Math.PI)ang+=2*Math.PI;

  const fov=aiming?VFOV*0.45:VFOV;

  // cull if outside fov
  if(Math.abs(ang)>fov*0.6)return;

  // fisheye corrected distance
  const corr=Math.max(1,dist*Math.cos(ang));

  // screen x: map angle to screen column
  const screenX=(ang/fov+0.5)*W;

  // occlusion test
  const col=Math.floor(screenX);
  if(col>0&&col<ZB.length&&ZB[col]<corr-2)return;

  // sprite size
  const zoom=aiming?1.8:1.0;
  const sh=Math.min(H*3,(SZ/corr)*240*zoom);
  const sw=sh*0.5;
  const sy=(H-sh)/2;

  cx.save();
  // body
  cx.fillStyle='#c0392b';
  cx.fillRect(screenX-sw*0.28,sy+sh*0.17,sw*0.56,sh*0.54);
  // head
  cx.fillStyle='#e67e22';
  cx.fillRect(screenX-sw*0.2,sy+sh*0.03,sw*0.4,sh*0.14);
  // legs
  cx.fillStyle='#922b21';
  cx.fillRect(screenX-sw*0.25,sy+sh*0.71,sw*0.2,sh*0.27);
  cx.fillRect(screenX+sw*0.05,sy+sh*0.71,sw*0.2,sh*0.27);
  // healthbar
  const bw=Math.max(28,sw*0.9),bx=screenX-bw/2,by=sy-12;
  cx.fillStyle='#333';cx.fillRect(bx,by,bw,4);
  cx.fillStyle=O.hp>50?'#2ecc71':'#e74c3c';
  cx.fillRect(bx,by,bw*(Math.max(0,O.hp)/100),4);
  cx.restore();
}

// ── GUN MODEL ──
function drawGun(){
  const W=cv.width,H=cv.height;
  if(!P.gun||P.dead)return;
  const g=P.gun,t=Date.now();
  const bob=aiming?0:Math.sin(t*0.003)*3;
  const boby=aiming?0:Math.abs(Math.sin(t*0.003))*5;
  const rec=(t-lshot<100)?18:0;
  const gx=W*0.62+bob+(aiming?-W*0.18:0);
  const gy=H*0.74+boby+rec;
  cx.save();
  cx.fillStyle='#383838';
  if(g.name==='SNIPER'){cx.fillRect(gx-12,gy-16,130,19);cx.fillRect(gx+68,gy-21,62,9);}
  else if(g.name==='SHOTGUN'){cx.fillRect(gx-12,gy-15,106,21);cx.fillRect(gx+52,gy-19,54,10);}
  else if(g.name==='SMG'){cx.fillRect(gx-10,gy-11,78,16);cx.fillRect(gx+48,gy-14,38,7);}
  else{cx.fillRect(gx-10,gy-13,92,18);cx.fillRect(gx+56,gy-17,46,8);}
  cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=1;cx.strokeRect(gx-10,gy-13,92,18);
  if(P.rld){cx.fillStyle='rgba(243,156,18,0.9)';cx.font='11px Courier New';cx.fillText('RELOADING...',gx-14,gy-24);}
  cx.restore();
}

// ── MINIMAP ──
function drawMM(){
  const sc=90/SZ;
  mx.clearRect(0,0,90,90);
  mx.fillStyle='rgba(0,0,0,0.85)';mx.fillRect(0,0,90,90);
  for(const w of WL){
    mx.fillStyle=w[4]===1?'#2a3040':w[4]===2?'#4a3020':'#1e2028';
    mx.fillRect(w[0]*sc,w[1]*sc,w[2]*sc,w[3]*sc);
  }
  mx.fillStyle='#2ecc71';mx.beginPath();mx.arc(P.x*sc,P.y*sc,3,0,Math.PI*2);mx.fill();
  mx.strokeStyle='#2ecc71';mx.lineWidth=1.5;mx.beginPath();
  mx.moveTo(P.x*sc,P.y*sc);
  mx.lineTo((P.x+Math.cos(P.a)*14)*sc,(P.y+Math.sin(P.a)*14)*sc);
  mx.stroke();
  if(O.vis||solo){mx.fillStyle='#e74c3c';mx.beginPath();mx.arc(O.x*sc,O.y*sc,3,0,Math.PI*2);mx.fill();}
}

// ── LOOP ──
function loop(ts){
  const dt=Math.min(ts-lframe,50);lframe=ts;
  if(going){
    moveP();updBot(dt);updBuls();updParts();
    if(P.gun&&P.gun.auto&&mdown&&!P.dead)shoot();
    if(ws&&ws.readyState===1&&ts-lpt>3000){pt=ts;ws.send(JSON.stringify({type:'ping'}));lpt=ts;}
  }
  drawWorld();
  drawOpponent();
  drawGun();
  drawMM();
  requestAnimationFrame(loop);
}

// ── DESKTOP INPUT ──
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyR')reload();
  if(e.code==='Space'){e.preventDefault();if(P.gun&&!P.gun.auto)shoot();}
});
document.addEventListener('keyup',e=>keys[e.code]=false);

cv.addEventListener('mousedown',e=>{
  if(e.button===0){
    if(!locked){cv.requestPointerLock();return;}
    if(!going)return;mdown=true;if(P.gun&&!P.gun.auto)shoot();
  }
  if(e.button===2){e.preventDefault();if(!going)return;setAim(true);}
});
cv.addEventListener('mouseup',e=>{
  if(e.button===0)mdown=false;
  if(e.button===2)setAim(false);
});
cv.addEventListener('contextmenu',e=>e.preventDefault());
document.addEventListener('mousemove',e=>{if(locked)mdx+=e.movementX;});
document.addEventListener('pointerlockchange',()=>{
  locked=document.pointerLockElement===cv;
  document.getElementById('lm').style.display=locked?'none':'block';
});

function setAim(on){
  aiming=on;
  document.getElementById('av').style.opacity=on?'1':'0';
  document.getElementById('ch').className=on?'aim':'';
}

// ── MOBILE ──
function jcen(){const r=document.getElementById('jz').getBoundingClientRect();return{cx:r.left+r.width/2,cy:r.top+r.height/2};}
function upKnob(dx,dy){
  const l=Math.sqrt(dx*dx+dy*dy);if(l>JR){dx=dx/l*JR;dy=dy/l*JR;}
  jdx=dx;jdy=dy;
  const k=document.getElementById('jk');k.style.left=(55+dx-23)+'px';k.style.top=(55+dy-23)+'px';
}
function rstKnob(){jdx=0;jdy=0;jact=false;jtid=null;const k=document.getElementById('jk');k.style.left='32px';k.style.top='32px';}

document.getElementById('jz').addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];jtid=t.identifier;jact=true;const{cx:cx2,cy:cy2}=jcen();upKnob(t.clientX-cx2,t.clientY-cy2);},{passive:false});
document.getElementById('jz').addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===jtid){const{cx:cx2,cy:cy2}=jcen();upKnob(t.clientX-cx2,t.clientY-cy2);}},{passive:false});
document.getElementById('jz').addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===jtid)rstKnob();},{passive:false});
document.getElementById('lz').addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];ltid=t.identifier;llx=t.clientX;},{passive:false});
document.getElementById('lz').addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches)if(t.identifier===ltid){P.a+=(t.clientX-llx)*0.005*(aiming?0.35:1);llx=t.clientX;}},{passive:false});
document.getElementById('lz').addEventListener('touchend',e=>{for(const t of e.changedTouches)if(t.identifier===ltid)ltid=null;},{passive:false});
document.getElementById('sb').addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();if(!going)return;mdown=true;shoot();},{passive:false});
document.getElementById('sb').addEventListener('touchend',e=>{e.preventDefault();mdown=false;},{passive:false});
document.getElementById('ab').addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();setAim(true);},{passive:false});
document.getElementById('ab').addEventListener('touchend',e=>{e.preventDefault();setAim(false);},{passive:false});
document.getElementById('rlb').addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();reload();},{passive:false});

// ── MULTIPLAYER ──
function connectAndPlay(){
  const room=(document.getElementById('ri').value.trim().toUpperCase()||'DEFAULT').slice(0,12);
  const proto=location.protocol==='https:'?'wss:':'ws:';
  const url=proto+'//'+location.host+'/ws?room='+room;
  document.getElementById('sm').textContent='CONNECTING...';
  try{
    ws=new WebSocket(url);
    ws.onopen=()=>{document.getElementById('sm').textContent='ROOM: '+room+' — WAITING...';ws.send(JSON.stringify({type:'join',room}));};
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type==='full'){document.getElementById('sm').textContent='ROOM FULL — TRY ANOTHER CODE';}
      else if(m.type==='start'){startGame(false);spawnP(m.spawnIndex||0);const si=((m.spawnIndex||0)+2)%4;O.x=SP[si].x;O.y=SP[si].y;}
      else if(m.type==='pos'){O.x=m.x;O.y=m.y;O.a=m.angle;O.hp=m.health;O.vis=true;}
      else if(m.type==='shoot'){BULS.push({x:m.x,y:m.y,a:m.angle,spd:12,own:'remote',d:0,max:450});}
      else if(m.type==='hit'){dmg(m.damage);}
      else if(m.type==='died'){P.score++;upScore();kfeed('YOU','ENEMY');if(P.score>=5)endGame(true);}
      else if(m.type==='kill'){O.score++;upScore();kfeed('ENEMY','YOU');if(O.score>=5)endGame(false);}
      else if(m.type==='pong'){document.getElementById('pg').textContent='PING: '+Math.round(Date.now()-pt)+'ms';}
      else if(m.type==='opponent_left'){O.vis=false;}
    };
    ws.onerror=()=>document.getElementById('sm').textContent='CONNECTION ERROR';
    ws.onclose=()=>{O.vis=false;};
  }catch(e){document.getElementById('sm').textContent='FAILED';}
}

function playSolo(){solo=true;startGame(true);}

function startGame(s){
  document.getElementById('ov').style.display='none';
  going=true;spawnP(0);
  if(s)initBot();
  if(!isMob)cv.requestPointerLock();
}

requestAnimationFrame(loop);
